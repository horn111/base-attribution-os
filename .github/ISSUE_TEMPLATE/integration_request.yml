name: Integration request
description: Request an adapter, example, or scanner rule
title: "[Integration]: "
labels: ["integration"]
body:
  - type: input
    id: stack
    attributes:
      label: Stack
      placeholder: "ethers, Privy, Dynamic, Coinbase Wallet, agent framework"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What attribution flow should Base Attribution OS support?
    validations:
      required: true
  - type: textarea
    id: snippet
    attributes:
      label: Current transaction code
      description: Share a minimal public snippet if possible.
