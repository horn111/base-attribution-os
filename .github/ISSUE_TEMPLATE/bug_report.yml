name: Bug report
description: Report incorrect attribution behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include command, calldata, transaction hash, or code snippet.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package
      placeholder: "@base-attribution-os/cli"
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
