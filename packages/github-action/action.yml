name: "Base Attribution OS"
description: "Fail pull requests when Base Builder Code attribution is missing from transaction code."
author: "horn111"
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  builder-code:
    description: "Expected Builder Code, for example bc_abc123."
    required: true
  path:
    description: "Repository root to scan."
    required: false
    default: "."
  paths:
    description: "Comma-separated subpaths to scan."
    required: false
    default: ""
  profile:
    description: "Scanner profile: local reports findings without failing by default, ci fails obvious missing attribution, strict requires the expected Builder Code in candidate files."
    required: false
    default: "ci"
  fail-on-missing:
    description: "Override the selected profile's default failure behavior."
    required: false
runs:
  using: "node20"
  main: "dist/index.js"
